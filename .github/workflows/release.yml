name: Release Obsidian plugin (GitHub)

on:
    push:
        tags:
            - '[0-9].[0-9].[0-9]'

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: read

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: "20.x"
                    cache: 'npm'

            -   name: Build
                run: |
                    npm ci
                    npm run build

            -   name: Release
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: |
                    tag="${GITHUB_REF#refs/tags/}"
                      # 验证必要的文件
                    for file in dist/main.js dist/manifest.json dist/styles.css; do
                      if [ ! -f "$file" ]; then
                        echo "错误：$file 不存在"
                        exit 1
                      fi
                    done
                    
                    # 创建 Release
                    gh release create "$tag" \
                      --title="$tag" \
                      --generate-notes \
                      dist/main.js dist/manifest.json dist/styles.css
