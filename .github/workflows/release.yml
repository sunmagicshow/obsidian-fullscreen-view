name: Release Obsidian plugin (GitHub)

on:
    push:
        tags:
            - '[0-9].[0-9].[0-9]'

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Use Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: "20.x"

            -   name: Build
                run: |
                    npm ci
                    npm run build

            -   name: Release
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: |
                    tag="${GITHUB_REF#refs/tags/}"

                    gh release create "$tag" \
                      --title="$tag" \
                      --generate-notes \
                      main.js manifest.json styles.css
